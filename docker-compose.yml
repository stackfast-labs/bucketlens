services:
  r2-media-browser:
    build: .
    restart: unless-stopped
    ports:
      - "3117:3117"
    environment:
      PORT: "3117"
      APP_TITLE: "AbSim Assets"
      S3_ENDPOINT: "https://<ACCOUNT_ID>.r2.cloudflarestorage.com"
      S3_REGION: "auto"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
      S3_BUCKET: "absim-assets"
      S3_FORCE_PATH_STYLE: "true"
      S3_PREFIX: "absim/attachments"
      PUBLIC_BASE_URL: "https://absim-assets.mlw88.net/absim/attachments"
      APP_TOKEN: "${APP_TOKEN}"
      MAX_UPLOAD_BYTES: "21474836480"
      CACHE_DIR: "/app/.cache"
    volumes:
      - r2-media-browser-cache:/app/.cache

volumes:
  r2-media-browser-cache:
